---
name: Build
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - release/*
  pull_request:
jobs:
  yamllint:
    uses: dropwizard/workflows/.github/workflows/yamllint.yml@0e920ffd2f8565385330680332f6152de022e065 # main
  build:
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21', '25']
    uses: dropwizard/workflows/.github/workflows/maven.yml@0e920ffd2f8565385330680332f6152de022e065 # main
    secrets: inherit
    with:
      java-version: ${{ matrix.java-version }}
